<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mi Weather App</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=DM+Serif+Display&display=swap');

    body {
      background-color: #f7f7f5;
      font-family: 'DM Sans', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    .tarjeta {
      background-color: #ffffff;
      border-radius: 28px;
      border: 1px solid #eeeeee;
      padding: 2rem 1.75rem;
      width: 300px;
      color: #111;
      transition: background-color 0.8s ease, border-color 1.5s ease, color 1.5s ease;
    }

    body.oscuro .tarjeta {
  border-color: #2a3a5c;
  color: #f0f0f0;
}

    .contenido {
      transition: opacity 0.3s ease, transform 0.3s ease;
    }

    .contenido.oculto {
      opacity: 0;
      transform: translateY(8px);
    }

    .ciudad {
      font-size: 11px;
      color: #bbb;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      margin: 0 0 1.5rem;
      text-align: center;
      transition: color 1.5s ease;
    }

    body.oscuro .ciudad {
      color: #555;
    }

    .icono {
      font-size: 52px;
      margin: 0 0 0.5rem;
      line-height: 1;
      display: block;
      text-align: center;
      transform: rotate(0deg) scale(1);
      opacity: 1;
      transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.4s ease;
    }

    .icono.animar {
      transform: rotate(-20deg) scale(0.5);
      opacity: 0;
    }

    .temperatura {
      font-family: 'DM Serif Display', serif;
      font-size: 96px;
      line-height: 1;
      color: #111;
      margin: 0;
      letter-spacing: -4px;
      text-align: center;
      transition: color 1.5s ease;
    }

    body.oscuro .temperatura {
      color: #f0f0f0;
    }

    .condicion {
      font-size: 14px;
      color: #e06030;
      margin: 6px 0 0;
      text-transform: capitalize;
      font-weight: 400;
      text-align: center;
    }

    .frase {
      font-size: 13px;
      color: #aaa;
      font-style: italic;
      margin: 8px 0 1.75rem;
      line-height: 1.6;
      text-align: center;
      transition: color 1.5s ease;
    }

    body.oscuro .frase {
      color: #555;
    }

    .stats {
      display: flex;
      justify-content: space-between;
      border-top: 1px solid #f0f0f0;
      padding-top: 1rem;
      margin-bottom: 0;
      transition: border-color 1.5s ease;
    }

    body.oscuro .stats {
      border-top-color: #1e2433;
    }

    .stat {
      text-align: center;
    }

    .stat-valor {
      font-size: 15px;
      font-weight: 500;
      color: #111;
      transition: color 1.5s ease;
    }

    body.oscuro .stat-valor {
      color: #f0f0f0;
    }

    .stat-label {
      font-size: 10px;
      color: #ccc;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-top: 3px;
      transition: color 1.5s ease;
    }

    body.oscuro .stat-label {
      color: #444;
    }

    #prediccion {
      margin-top: 1rem;
    }

    .prediccion-fila {
      display: flex;
      justify-content: space-between;
      border-top: 1px solid #f0f0f0;
      padding-top: 0.75rem;
      margin-top: 0.25rem;
      transition: border-color 1.5s ease;
    }

    body.oscuro .prediccion-fila {
      border-top-color: #1e2433;
    }

    .prediccion-dia {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      flex: 1;
    }

    .prediccion-nombre {
      font-size: 10px;
      color: #bbb;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      transition: color 1.5s ease;
    }

    body.oscuro .prediccion-nombre {
      color: #444;
    }

    .prediccion-icono {
      font-size: 22px;
      line-height: 1;
    }

    .prediccion-temp {
      font-size: 13px;
      font-weight: 500;
      color: #111;
      transition: color 1.5s ease;
    }

    body.oscuro .prediccion-temp {
      color: #f0f0f0;
    }

    .prediccion-min {
      font-size: 11px;
      color: #ccc;
      transition: color 1.5s ease;
    }

    body.oscuro .prediccion-min {
      color: #444;
    }

    button {
      margin-top: 1.25rem;
      background: none;
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      color: #e06030;
      cursor: pointer;
      padding: 0;
      letter-spacing: 0.05em;
      display: block;
    }

    input {
      margin-top: 1rem;
      padding: 6px 0;
      border: none;
      border-bottom: 1px solid #eee;
      background: transparent;
      color: #111;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      outline: none;
      width: 100%;
      box-sizing: border-box;
      transition: border-color 1.5s ease, color 1.5s ease;
    }

    body.oscuro input {
      border-bottom-color: #1e2433;
      color: #f0f0f0;
    }

    input:focus {
      border-bottom-color: #e06030;
    }

    input::placeholder {
      color: #ccc;
    }

    body.oscuro input::placeholder {
      color: #444;
    }
  </style>
</head>
<body>

  <div class="tarjeta">
    <div class="contenido">
      <p class="ciudad" id="ciudad">--</p>
      <span class="icono" id="icono">--</span>
      <p class="temperatura" id="temperatura">--°</p>
      <p class="condicion" id="condicion">--</p>
      <p class="frase" id="frase">--</p>

      <div class="stats">
        <div class="stat">
          <div class="stat-valor" id="sensacion">--°</div>
          <div class="stat-label">Sensación</div>
        </div>
        <div class="stat">
          <div class="stat-valor" id="humedad">--%</div>
          <div class="stat-label">Humedad</div>
        </div>
        <div class="stat">
          <div class="stat-valor" id="viento">-- km/h</div>
          <div class="stat-label">Viento</div>
        </div>
      </div>

      <div id="prediccion"></div>
    </div>

    <button onclick="buscarPorUbicacion()">↻ Usar mi ubicación</button>
    <input type="text" id="input-ciudad" placeholder="Buscar ciudad..." />
  </div>

  <script>
    const API_KEY = "bd5e378503939ddaee76f12ad7a97608";

    const iconos = {
      clear:        "☀️",
      clouds:       "☁️",
      rain:         "🌧️",
      drizzle:      "🌦️",
      thunderstorm: "⛈️",
      snow:         "❄️",
      mist:         "🌫️",
      default:      "🌈"
    };

    const fondosClaro = {
      clear:        "#FFF9E6",
      clouds:       "#F5F5F5",
      rain:         "#EEF2F7",
      drizzle:      "#F0F5FA",
      thunderstorm: "#EEEEF5",
      snow:         "#F5F8FF",
      mist:         "#F5F5F5"
    };

    const fondosOscuro = {
  clear:        "#1a2744",
  clouds:       "#1c2840",
  rain:         "#172240",
  drizzle:      "#172240",
  thunderstorm: "#12192e",
  snow:         "#1a2540",
  mist:         "#1c2840"
};

    function obtenerClave(descripcion) {
      const d = descripcion.toLowerCase();
      if (d.includes("clear"))     return "clear";
      if (d.includes("cloud"))     return "clouds";
      if (d.includes("rain"))      return "rain";
      if (d.includes("drizzle"))   return "drizzle";
      if (d.includes("thunder"))   return "thunderstorm";
      if (d.includes("snow"))      return "snow";
      if (d.includes("mist") || d.includes("fog")) return "mist";
      return "default";
    }

    function esNoche(sunrise, sunset) {
      const ahora = Date.now() / 1000;
      return ahora < sunrise || ahora > sunset;
    }

    function aplicarModo(noche) {
      if (noche) {
        document.body.classList.add("oscuro");
      } else {
        document.body.classList.remove("oscuro");
      }
    }

    function animarContador(elemento, valorFinal, duracion) {
      const inicio = Date.now();

      function paso() {
        const progreso = Math.min((Date.now() - inicio) / duracion, 1);
        const ease = 1 - Math.pow(1 - progreso, 3);
        const actual = Math.round(valorFinal * ease);
        elemento.textContent = `${actual}°`;
        if (progreso < 1) requestAnimationFrame(paso);
      }

      requestAnimationFrame(paso);
    }

    async function buscarClima(ciudad, lat, lon) {
      const contenido = document.querySelector(".contenido");
      const iconoEl = document.getElementById("icono");

      contenido.classList.add("oculto");

      let url;
      let urlPrediccion;

      if (lat && lon) {
        url = `https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${API_KEY}&units=metric&lang=es`;
        urlPrediccion = `https://api.openweathermap.org/data/2.5/forecast?lat=${lat}&lon=${lon}&appid=${API_KEY}&units=metric&lang=es`;
      } else {
        url = `https://api.openweathermap.org/data/2.5/weather?q=${ciudad}&appid=${API_KEY}&units=metric&lang=es`;
        urlPrediccion = `https://api.openweathermap.org/data/2.5/forecast?q=${ciudad}&appid=${API_KEY}&units=metric&lang=es`;
      }

      const respuesta = await fetch(url);
      const datos = await respuesta.json();

      if (datos.cod !== 200) {
        document.getElementById("ciudad").textContent = "Ciudad no encontrada";
        contenido.classList.remove("oculto");
        return;
      }

      const respuestaPrediccion = await fetch(urlPrediccion);
      const datosPrediccion = await respuestaPrediccion.json();

      const clave = obtenerClave(datos.weather[0].main);
      const temp = Math.round(datos.main.temp);
      const noche = esNoche(datos.sys.sunrise, datos.sys.sunset);
      const fondos = noche ? fondosOscuro : fondosClaro;

      let fraseTemp;
      if (temp > 30) {
        fraseTemp = "Estoy a dos grados de convertirme en gazpacho";
      } else if (temp > 20) {
        fraseTemp = "Hoy sí se puede existir dignamente";
      } else if (temp > 10) {
        fraseTemp = "Hace frío hasta para pensar";
      } else {
        fraseTemp = "El café ya no es bebida, es supervivencia";
      }

      setTimeout(() => {
        aplicarModo(noche);

        iconoEl.classList.add("animar");

        document.getElementById("ciudad").textContent = `${datos.name}, ${datos.sys.country}`;
        document.getElementById("icono").textContent = noche ? "🌙" : iconos[clave];
        document.getElementById("condicion").textContent = datos.weather[0].description;
        document.getElementById("frase").textContent = fraseTemp;
        document.getElementById("sensacion").textContent = `${Math.round(datos.main.feels_like)}°`;
        document.getElementById("humedad").textContent = `${datos.main.humidity}%`;
        document.getElementById("viento").textContent = `${Math.round(datos.wind.speed * 3.6)} km/h`;
        document.querySelector(".tarjeta").style.backgroundColor = fondos[clave] || fondos.default;

        const diasMap = {};
        datosPrediccion.list.forEach(entry => {
          const fecha = entry.dt_txt.split(" ")[0];
          const hora = entry.dt_txt.split(" ")[1];
          if (hora === "12:00:00" && !diasMap[fecha]) {
            diasMap[fecha] = entry;
          }
        });
        const dias = Object.values(diasMap).slice(0, 5);

        const nombresdia = ["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];
        let htmlDias = `<div class="prediccion-fila">`;
        dias.forEach(dia => {
          const fecha = new Date(dia.dt_txt);
          const nombre = nombresdia[fecha.getDay()];
          const claveDia = obtenerClave(dia.weather[0].main);
          const max = Math.round(dia.main.temp_max);
          const min = Math.round(dia.main.temp_min);
          htmlDias += `
            <div class="prediccion-dia">
              <span class="prediccion-nombre">${nombre}</span>
              <span class="prediccion-icono">${iconos[claveDia]}</span>
              <span class="prediccion-temp">${max}°</span>
              <span class="prediccion-min">${min}°</span>
            </div>`;
        });
        htmlDias += `</div>`;
        document.getElementById("prediccion").innerHTML = htmlDias;

        contenido.classList.remove("oculto");

        setTimeout(() => {
          iconoEl.classList.remove("animar");
        }, 50);

        const tempEl = document.getElementById("temperatura");
        animarContador(tempEl, temp, 600);

      }, 300);
    }

    function buscarPorUbicacion() {
      navigator.geolocation.getCurrentPosition(function(position) {
        const lat = position.coords.latitude;
        const lon = position.coords.longitude;
        buscarClima(null, lat, lon);
      });
    }

    document.getElementById("input-ciudad").addEventListener("keydown", function(e) {
      if (e.key === "Enter") {
        buscarClima(this.value);
      }
    });

    buscarClima("Barcelona");
  </script>

</body>
</html>
